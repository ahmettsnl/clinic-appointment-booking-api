version: "3.9"

services:
  api:
    build: .
    container_name: clinic_api
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: clinic_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: clinic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: